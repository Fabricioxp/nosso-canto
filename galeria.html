<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Canto 🤍</title>
    <!-- Ícones Modernos -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e12;
            --bg-card: #151c24;
            --bg-bubble-me: #1e6bf2;
            --bg-bubble-them: #232e3c;
            --text-main: #f5f7fa;
            --text-muted: #8a99ad;
            --accent: #00e676;
            --danger: #ff5252;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020608;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal do App (Estilo Celular Premium) */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        @media (min-width: 481px) {
            .app-container {
                height: 92vh;
                border-radius: 24px;
                border: 1px solid rgba(255,255,255,0.05);
            }
        }

        /* --- Telas Base --- */
        .view-section {
            display: none;
            flex-direction: column;
            flex: 1;
            height: calc(100% - 70px);
            overflow: hidden;
        }

        .view-section.active {
            display: flex;
        }

        /* --- Headers --- */
        .app-header {
            background-color: var(--bg-card);
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
        }

        .header-actions span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .header-actions span:hover {
            color: var(--text-main);
        }

        /* --- Lista de Conversas (Aba 1) --- */
        .search-bar-box {
            padding: 12px 20px;
        }

        .search-wrapper {
            background-color: var(--bg-card);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
        }

        .search-wrapper input {
            background: none;
            border: none;
            color: var(--text-main);
            width: 100%;
            font-size: 15px;
            outline: none;
        }

        .search-wrapper span {
            color: var(--text-muted);
            font-size: 20px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .chat-item {
            display: flex;
            padding: 14px 20px;
            gap: 16px;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover, .chat-item:active {
            background-color: rgba(255,255,255,0.02);
        }

        .user-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 14px;
        }

        .chat-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        /* --- Janela de Conversa Dedicada (Sobrepõe a interface quando aberta) --- */
        .chat-window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .chat-window-overlay.active {
            display: flex;
        }

        .chat-window-header {
            background-color: var(--bg-card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .back-btn {
            cursor: pointer;
            color: var(--text-main);
            padding: 4px;
        }

        .chat-window-user {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-user-info h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-user-info p {
            font-size: 12px;
            color: var(--accent);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .msg-bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .msg-bubble.me {
            background-color: var(--bg-bubble-me);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.them {
            background-color: var(--bg-bubble-them);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-timestamp {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            display: block;
            text-align: right;
            margin-top: 4px;
        }

        .chat-input-area {
            background-color: var(--bg-card);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        .input-box-wrapper {
            flex: 1;
            background-color: var(--bg-main);
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
        }

        .input-box-wrapper input {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        .send-action-btn {
            background-color: var(--bg-bubble-me);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .send-action-btn:active {
            transform: scale(0.95);
            background-color: #1559c8;
        }

        /* --- Aba Galeria (Aba 2) --- */
        .gallery-post-box {
            background-color: var(--bg-card);
            margin: 20px;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .gallery-post-box input {
            background-color: var(--bg-main);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }

        .gallery-post-box button {
            background-color: var(--accent);
            color: #020608;
            font-weight: 700;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .gallery-stream {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .gallery-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .gallery-card img {
            width: 100%;
            border-radius: 10px;
            max-height: 250px;
            object-fit: cover;
        }

        .gallery-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .gallery-author {
            font-weight: 600;
            color: var(--accent);
        }

        /* --- Aba Perfil / Configurações (Aba 3) --- */
        .profile-view {
            padding: 30px 20px;
            align-items: center;
            gap: 20px;
        }

        .profile-card {
            background-color: var(--bg-card);
            width: 100%;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-bubble-me);
        }

        .logout-btn {
            background-color: rgba(255,82,82,0.1);
            color: var(--danger);
            border: 1px solid rgba(255,82,82,0.2);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        /* --- Menu de Navegação Global Inferior --- */
        .app-navigation-bar {
            height: 70px;
            background-color: var(--bg-card);
            border-top: 1px solid rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            cursor: pointer;
            flex: 1;
            padding: 10px 0;
            transition: color 0.2s;
        }

        .nav-button.active {
            color: var(--text-main);
        }

        .nav-button span {
            font-size: 24px;
        }

        .nav-button.active span {
            color: var(--bg-bubble-me);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ================= ABA 1: CONVERSAS ================= -->
        <div id="view-chats" class="view-section active">
            <div class="app-header">
                <h1>Conversas</h1>
                <div class="header-actions">
                    <span class="material-icons-round">search</span>
                    <span class="material-icons-round">more_vert</span>
                </div>
            </div>
            
            <div class="search-bar-box">
                <div class="search-wrapper">
                    <span class="material-icons-round">search</span>
                    <input type="text" placeholder="Buscar conversas...">
                </div>
            </div>

            <div class="chats-list" id="dom-lista-conversas">
                <!-- Inserido dinamicamente via Javascript -->
            </div>
        </div>

        <!-- ================= ABA 2: GALERIA COMPARTILHADA ================= -->
        <div id="view-gallery" class="view-section">
            <div class="app-header">
                <h1>Nossa Galeria</h1>
                <div class="header-actions">
                    <span class="material-icons-round">auto_stories</span>
                </div>
            </div>

            <div class="gallery-post-box">
                <input type="text" id="input-galeria-url" placeholder="URL da Imagem de Vocês">
                <input type="text" id="input-galeria-titulo" placeholder="Legenda Especial (Opcional)">
                <button onclick="publicarNaGaleria()">Eternizar Momento</button>
            </div>

            <div class="gallery-stream" id="dom-container-galeria">
                <!-- Itens da galeria em tempo real -->
            </div>
        </div>

        <!-- ================= ABA 3: PERFIL / AJUSTES ================= -->
        <div id="view-profile" class="view-section">
            <div class="app-header">
                <h1>Espaço do Casal</h1>
            </div>
            <div class="profile-view">
                <div class="profile-card">
                    <img id="dom-meu-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" alt="Meu Avatar">
                    <h2 id="dom-meu-nome">Carregando...</h2>
                    <p style="color: var(--text-muted); font-size: 14px;">Conectado ao app oficial do casal</p>
                    <hr style="width: 100%; border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 10px 0;">
                    <button class="logout-btn" onclick="desconectarApp()">Sair do Aplicativo</button>
                </div>
            </div>
        </div>

        <!-- ================= JANELA DEDICADA DE CHAT (OVERLAY) ================= -->
        <div id="overlay-chat-window" class="chat-window-overlay">
            <div class="chat-window-header">
                <span class="material-icons-round back-btn" onclick="fecharJanelaChat()">arrow_back</span>
                <div class="chat-window-user">
                    <img id="dom-chat-avatar" class="user-avatar" src="" alt="Avatar Parceiro">
                    <div class="chat-user-info">
                        <h2 id="dom-chat-nome">Parceiro</h2>
                        <p>online agora</p>
                    </div>
                </div>
                <div class="header-actions">
                    <span class="material-icons-round">videocam</span>
                    <span class="material-icons-round">call</span>
                </div>
            </div>

            <!-- Box das Mensagens -->
            <div class="messages-container" id="dom-box-mensagens">
                <!-- Mensagens em Tempo Real -->
            </div>

            <!-- Footer Fixo de Envio (Solução para o botão sumir) -->
            <div class="chat-input-area">
                <div class="input-box-wrapper">
                    <input type="text" id="input-mensagem-texto" placeholder="Escreva seu carinho aqui..." onkeypress="escutarTeclado(event)">
                </div>
                <button class="send-action-btn" id="btn-enviar-mensagem-clique" onclick="enviarMensagemChat()">
                    <span class="material-icons-round">send</span>
                </button>
            </div>
        </div>

        <!-- BARRA DE NAVEGAÇÃO INFERIOR GLOBAL -->
        <div class="app-navigation-bar">
            <div class="nav-button active" onclick="trocarAba('view-chats', this)">
                <span class="material-icons-round">forum</span>
                <p>Conversas</p>
            </div>
            <div class="nav-button" onclick="trocarAba('view-gallery', this)">
                <span class="material-icons-round">collections</span>
                <p>Galeria</p>
            </div>
            <div class="nav-button" onclick="trocarAba('view-profile', this)">
                <span class="material-icons-round">favorite</span>
                <p>Amor</p>
            </div>
        </div>

    </div>

    <!-- SCRIPT DE GERENCIAMENTO CORE & FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config Original Mantida do Usuário
        const firebaseConfig = {
            apiKey: "AIzaSyAEyJHxEP96ZpSYfAgNO4wdQZIiArseGm4",
            authDomain: "nosso-canto-5d714.firebaseapp.com",
            projectId: "nosso-canto-5d714",
            storageBucket: "nosso-canto-5d714.firebasestorage.app",
            messagingSenderId: "1042257316625",
            appId: "1:1042257316625:web:b96e37ad034b598ea61ab0"
        };
        
        const db = getFirestore(initializeApp(firebaseConfig));

        // Validação Inteligente Baseada no Login Prévio (index.html)
        const usuarioAtivo = sessionStorage.getItem('user_canto') || "Fabricio"; 

        // Definição das Entidades do Casal
        const perfisMapeados = {
            "fabricio": {
                nome: "Fabricio",
                avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150",
                parceiroNome: "Maria",
                parceiroAvatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150"
            },
            "maria": {
                nome: "Maria",
                avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150",
                parceiroNome: "Fabricio",
                parceiroAvatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150"
            }
        };

        // Fallback dinâmico caso a string do sessionStorage mude maiúsculas/minúsculas
        const chaveUsuario = usuarioAtivo.toLowerCase() === "maria" ? "maria" : "fabricio";
        const dadosEu = perfisMapeados[chaveUsuario];

        // Atualizar Dados Estáticos na Tela de Perfil do usuário atual
        document.getElementById('dom-meu-nome').innerText = dadosEu.nome;
        document.getElementById('dom-meu-avatar').src = dadosEu.avatar;

        /* --- LÓGICA DE NAVEGAÇÃO DE ABAS --- */
        window.trocarAba = (idAba, elementoBotao) => {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(idAba).classList.add('active');
            elementoBotao.classList.add('active');
        };

        /* --- CONTROLE DA JANELA FLUTUANTE DE CHAT --- */
        window.abrirJanelaChat = () => {
            document.getElementById('dom-chat-nome').innerText = dadosEu.parceiroNome;
            document.getElementById('dom-chat-avatar').src = dadosEu.parceiroAvatar;
            document.getElementById('overlay-chat-window').classList.add('active');
            forcarRolarParaBaixo();
        };

        window.fecharJanelaChat = () => {
            document.getElementById('overlay-chat-window').classList.remove('active');
        };

        window.desconectarApp = () => {
            sessionStorage.removeItem('user_canto');
            window.location.href = 'index.html';
        };

        /* --- CONTROLADORES DO ENVIAR DO CHAT --- */
        const inputTextoMsg = document.getElementById('input-mensagem-texto');

        window.escutarTeclado = (event) => {
            if(event.key === 'Enter') {
                enviarMensagemChat();
            }
        };

        window.enviarMensagemChat = async () => {
            const mensagemLimpa = inputTextoMsg.value.trim();
            if(!mensagemLimpa) return;

            // Limpa o input imediatamente prevenindo double clicks
            inputTextoMsg.value = "";

            try {
                await addDoc(collection(db, "mensagens_chat"), {
                    texto: mensagemLimpa,
                    remetente: dadosEu.nome,
                    criadoEm: Date.now()
                });
            } catch (erro) {
                console.error("Erro ao enviar mensagem: ", erro);
                alert("Falha ao entregar mensagem. Verifique a conexão.");
            }
        };

        /* --- SINCRO EM TEMPO REAL DAS MENSAGENS (FIRESTORE) --- */
        onSnapshot(query(collection(db, "mensagens_chat"), orderBy("criadoEm", "asc")), (snapshot) => {
            const boxMensagens = document.getElementById('dom-box-mensagens');
            boxMensagens.innerHTML = '';
            
            let conteudoUltimaMensagem = "Inicie essa linda história...";
            let horarioUltimaMensagem = "";

            snapshot.forEach(documento => {
                const dadosMsg = documento.data();
                const verficiacaoRemetenteMe = dadosMsg.remetente === dadosEu.nome;
                
                // Conversão de hora
                const horaFormatada = new Date(dadosMsg.criadoEm).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                
                conteudoUltimaMensagem = dadosMsg.texto;
                horarioUltimaMensagem = horaFormatada;

                // Renderização estruturada dos balões
                boxMensagens.innerHTML += `
                    <div class="msg-bubble ${verficiacaoRemetenteMe ? 'me' : 'them'}">
                        ${dadosMsg.texto}
                        <span class="msg-timestamp">${horaFormatada}</span>
                    </div>
                `;
            });

            // Atualiza o card de conversa fora da janela na aba principal
            renderizarItemNaListaConversas(conteudoUltimaMensagem, horarioUltimaMensagem);
            forcarRolarParaBaixo();
        });

        function renderizarItemNaListaConversas(textoPreview, horaPreview) {
            const containerLista = document.getElementById('dom-lista-conversas');
            containerLista.innerHTML = `
                <div class="chat-item" onclick="abrirJanelaChat()">
                    <img class="user-avatar" src="${dadosEu.parceiroAvatar}" alt="Foto Parceiro">
                    <div class="chat-details">
                        <div class="chat-row-top">
                            <span class="chat-name">${dadosEu.parceiroNome}</span>
                            <span class="chat-time">${horaPreview ? horaPreview : 'Agora'}</span>
                        </div>
                        <div class="chat-preview">${textoPreview}</div>
                    </div>
                </div>
            `;
        }

        function forcarRolarParaBaixo() {
            const boxMensagens = document.getElementById('dom-box-mensagens');
            boxMensagens.scrollTop = boxMensagens.scrollHeight;
        }


        /* --- MURAL/GALERIA DE FOTOS INTEGRADO --- */
        window.publicarNaGaleria = async () => {
            const inputUrl = document.getElementById('input-galeria-url');
            const inputTitulo = document.getElementById('input-galeria-titulo');

            const urlValida = inputUrl.value.trim();
            const legendaValida = inputTitulo.value.trim();

            if(!urlValida) return alert("Por favor, cole um link válido da sua imagem!");

            await addDoc(collection(db, "galeria"), { 
                url: urlValida, 
                titulo: legendaValida, 
                autor: dadosEu.nome, 
                criadoEm: Date.now() 
            });

            inputUrl.value = '';
            inputTitulo.value = '';
        };

        // Escuta em tempo real a galeria compartilhada
        onSnapshot(query(collection(db, "galeria"), orderBy("criadoEm", "desc")), (snapshot) => {
            const containerGaleria = document.getElementById('dom-container-galeria');
            containerGaleria.innerHTML = '';
            
            snapshot.forEach(doc => {
                const itemGaleria = doc.data();
                containerGaleria.innerHTML += `
                    <div class="gallery-card">
                        <img src="${itemGaleria.url}" alt="Foto do Casal" onerror="this.src='https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=400'">
                        ${itemGaleria.titulo ? `<p style="font-size:14px; margin-top:4px;">${itemGaleria.titulo}</p>` : ''}
                        <div class="gallery-meta">
                            <span class="gallery-author">Por: ${itemGaleria.autor}</span>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
