<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Galeria 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8c625d; --bg: #fff3f2; }
        body { background: var(--bg); font-family: 'Comfortaa', cursive; padding: 20px; color: #4a3e3d; }
        .container { max-width: 500px; margin: 0 auto; }
        .post-card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .upload-box { background: white; padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .media { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html">👈 Voltar</a>
        <h1>Nossa Galeria 🤍</h1>
        
        <div class="upload-box">
            <input type="text" id="url-foto" placeholder="Link da imagem/vídeo">
            <input type="text" id="titulo-foto" placeholder="Título (opcional)">
            <button onclick="postar()">Publicar no Mural</button>
        </div>

        <div id="feed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEyJHxEP96ZpSYfAgNO4wdQZIiArseGm4",
            authDomain: "nosso-canto-5d714.firebaseapp.com",
            projectId: "nosso-canto-5d714",
            storageBucket: "nosso-canto-5d714.firebasestorage.app",
            messagingSenderId: "1042257316625",
            appId: "1:1042257316625:web:b96e37ad034b598ea61ab0"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const usuario = sessionStorage.getItem('user_canto') || "Anônimo";

        window.postar = async () => {
            const url = document.getElementById('url-foto').value;
            const titulo = document.getElementById('titulo-foto').value;
            if(!url) return alert("Cole o link primeiro!");
            
            await addDoc(collection(db, "galeria"), { 
                url, titulo, autor: usuario, criadoEm: Date.now() 
            });
            document.getElementById('url-foto').value = '';
            document.getElementById('titulo-foto').value = '';
        };

        onSnapshot(query(collection(db, "galeria"), orderBy("criadoEm", "desc")), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                feed.innerHTML += `
                    <div class="post-card">
                        <strong>${item.autor}</strong>
                        ${item.titulo ? `<p>${item.titulo}</p>` : ''}
                        <img src="${item.url}" class="media" onclick="window.open('${item.url}')">
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
