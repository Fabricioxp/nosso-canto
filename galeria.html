<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Feed de Memórias ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8c625d; --bg: #fdf6f0; --text: #4a3e3d; }
        body { background: var(--bg); font-family: 'Comfortaa', cursive; color: var(--text); padding-bottom: 50px; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .post-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .header-post { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.8rem; font-weight: bold; }
        .media-box { width: 100%; border-radius: 15px; overflow: hidden; background: #eee; }
        .media-box img, .media-box video { width: 100%; display: block; }
        .info { padding: 10px 0; }
        .actions { display: flex; gap: 15px; padding: 10px 0; border-top: 1px solid #eee; }
        button { border: none; background: none; cursor: pointer; font-size: 1.2rem; }
        .input-form { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html">👈 Voltar</a>
        <h1>Nossas Memórias 🤍</h1>
        
        <div class="input-form">
            <input type="text" id="url" placeholder="Link da foto/vídeo (Drive/URL)">
            <input type="text" id="titulo" placeholder="Título (opcional)">
            <textarea id="desc" placeholder="Descrição (opcional)"></textarea>
            <button class="btn-main" onclick="postar()">Publicar no Feed</button>
        </div>

        <div id="feed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyAEyJHxEP96ZpSYfAgNO4wdQZIiArseGm4",
            projectId: "nosso-canto-5d714",
            storageBucket: "nosso-canto-5d714.firebasestorage.app",
            messagingSenderId: "1042257316625",
            appId: "1:1042257316625:web:b96e37ad034b598ea61ab0"
        }));

        const usuario = sessionStorage.getItem('user_canto') || 'Amor';

        window.postar = async () => {
            const url = document.getElementById('url').value;
            if(!url) return alert("Cole o link da mídia!");
            await addDoc(collection(db, "feed"), {
                url, titulo: document.getElementById('titulo').value,
                desc: document.getElementById('desc').value,
                autor: usuario, data: new Date().toLocaleDateString(),
                likes: 0, criadoEm: Date.now()
            });
            document.getElementById('url').value = '';
        };

        window.curtir = async (id) => {
            await updateDoc(doc(db, "feed", id), { likes: increment(1) });
        };

        onSnapshot(query(collection(db, "feed"), orderBy("criadoEm", "desc")), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                feed.innerHTML += `
                    <div class="post-card">
                        <div class="header-post"><span>${p.autor}</span> <span>${p.data}</span></div>
                        <div class="media-box">
                            ${p.url.includes('.mp4') ? `<video controls src="${p.url}"></video>` : `<img src="${p.url}">`}
                        </div>
                        <div class="info">
                            <strong>${p.titulo || ''}</strong>
                            <p>${p.desc || ''}</p>
                        </div>
                        <div class="actions">
                            <button onclick="curtir('${d.id}')">❤️ ${p.likes}</button>
                            <button onclick="alert('Compartilhado no nosso coração!')">🔗</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
