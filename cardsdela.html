<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Dela 💖</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --primary: #8c625d;
            --secondary: #a68580;
            --border-color: #e6b3a8;
            --bg-card: #ffffff;
            --text-color: #4a3e3d;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-title: Georgia, Cambria, 'Times New Roman', Times, serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff3f2; 
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom: 90px;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        button, input, select, textarea, a {
            touch-action: manipulation;
            transform: translateZ(0);
            will-change: transform;
        }

        .header-status-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            z-index: 9999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 0 20px;
            box-shadow: 0 2px 15px rgba(140, 98, 93, 0.08);
            border-bottom: 1px solid rgba(230, 179, 168, 0.25);
        }

        .status-usuario-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-nome-parceiro {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary);
        }

        .btn-voltar {
            background: none; 
            border: 1px solid var(--border-color);
            padding: 5px 10px; 
            border-radius: 10px;
            font-size: 0.8rem; 
            font-family: var(--font-main);
            color: var(--secondary); 
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-voltar:hover { background: rgba(230, 179, 168, 0.15); }

        header {
            text-align: center;
            padding: 90px 20px 35px 20px;
            position: relative;
        }

        header h1 {
            font-family: var(--font-title);
            font-size: 2.3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        header p { font-size: 1rem; color: var(--secondary); }

        .container-blocos {
            max-width: 450px;
            margin: 0 auto;
            padding: 0 15px;
            position: relative;
            z-index: 5;
        }

        .bloco-separado {
            background-color: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(140, 98, 93, 0.12);
            margin-bottom: 25px;
            position: relative;
            height: auto;
        }

        .titulo-secao {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #bloco-cardsdela { background-color: #fff5f0; } 

        .painel-upload {
            background-color: #ffffff;
            border: 1px dashed var(--border-color);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(140, 98, 93, 0.05);
            position: relative;
            z-index: 6;
            height: auto;
        }

        .input-custom {
            width: 100%; padding: 12px 16px; border: 1px solid rgba(230, 179, 168, 0.6);
            border-radius: 15px; font-family: var(--font-main); font-size: 0.9rem;
            margin-bottom: 12px; outline: none; background: #fffbfb;
            color: var(--text-color); transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-custom:focus {
            border-color: var(--primary); background: #ffffff; box-shadow: 0 0 8px rgba(140, 98, 93, 0.1);
        }

        .btn-postar {
            width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 15px; font-family: var(--font-main);
            font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .btn-postar:hover { background-color: #734f4b; }

        /* Estilos idênticos ao layout interno de Cards da Página Principal */
        .card-separador-interno {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(140, 98, 93, 0.06);
            border: 1px solid rgba(230, 179, 168, 0.3);
            position: relative;
        }
        .data-card {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        .autor-tag { font-weight: bold; }
        .pdf-link { text-decoration: none; color: inherit; display: block; }
        .pdf-bloco { display: flex; flex-direction: column; gap: 8px; align-items: center; text-align: center; }
        .numero-card {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .moldura-imagem { width: 100%; max-height: 280px; overflow: hidden; border-radius: 12px; }
        .moldura-imagem img { width: 100%; height: 100%; object-fit: cover; }
        .contador-titulo { font-size: 1.1rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        .contador-tempo { font-size: 0.8rem; color: var(--secondary); font-weight: 500; }
        .pdf-subtitulo { font-size: 0.9rem; color: var(--text-color); margin-top: 4px; white-space: pre-line; }

        .acoes-card-custom { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
        .btn-acao-card { background: none; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; font-family: var(--font-main); }
        .btn-editar { color: var(--primary); }
        .btn-excluir { color: #d9534f; border-color: #f5c6cb; }

        /* Comentários */
        .secao-comentarios { margin-top: 15px; border-top: 1px dashed rgba(230, 179, 168, 0.4); padding-top: 12px; }
        .form-comentario { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-comentario { flex: 1; padding: 8px 12px; border: 1px solid rgba(230, 179, 168, 0.4); border-radius: 10px; font-size: 0.82rem; outline: none; font-family: var(--font-main); }
        .btn-comentar { background: var(--primary); border: none; color: white; padding: 0 12px; border-radius: 10px; font-size: 0.82rem; cursor: pointer; font-weight: bold; }
        .lista-comentarios { display: flex; flex-direction: column; gap: 6px; max-height: 150px; overflow-y: auto; }
        .comentario-linha { font-size: 0.8rem; background: #fffaf9; padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(230, 179, 168, 0.15); display: flex; justify-content: space-between; align-items: center; }
        .btn-deletar-comentario { background: none; border: none; color: #d9534f; font-size: 0.75rem; cursor: pointer; margin-left: 5px; }

        #canvas-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none !important; z-index: 1; transform: translateZ(0); }
    </style>
</head>
<body>

    <div class="header-status-bar">
        <div class="status-usuario-container">
            <span id="label-parceiro" class="status-nome-parceiro">Carregando...</span>
        </div>
        <a href="index.html" class="btn-voltar">⬅ Voltar ao Canto</a>
    </div>

    <canvas id="canvas-hearts"></canvas>

    <header>
        <h1>Cards Dela</h1>
        <p>Um espaço especial reservado para todas as suas fotos, memórias e momentos únicos. ✨</p>
    </header>

    <div class="container-blocos">
        
        <section class="painel-upload" id="painel-cardsdela-posts">
            <div class="titulo-secao" id="titulo-painel-cardsdela" style="margin-bottom: 15px;">📸 Adicionar Novo Card</div>
            <input type="hidden" id="editando-card-id" value="">
            
            <input type="text" id="card-nome" class="input-custom" placeholder="Título da Lembrança (Obrigatório)">
            <textarea id="card-desc" class="input-custom" rows="3" placeholder="Escreva sobre este momento... (Obrigatório)" style="resize: none;"></textarea>
            <input type="text" id="card-foto-url" class="input-custom" placeholder="Link da Foto/Imagem (Obrigatório)">
            <input type="text" id="card-link-externo" class="input-custom" placeholder="Link de Destino / Pasta (Opcional)">
            
            <button class="btn-postar" id="btn-salvar-card">Publicar Lembrança 💖</button>
        </section>

        <section class="bloco-separado" id="bloco-cardsdela">
            <div class="titulo-secao">💝 Momentos Guardados</div>
            <div id="novos-cards-dela"></div>
        </section>

    </div>

    <script type="module">
        let usuarioLogado = sessionStorage.getItem('user_canto');
        if (!usuarioLogado) {
            window.location.href = "index.html";
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEyJHxEP96ZpSYfAgNO4wdQZIiArseGm4",
            authDomain: "nosso-canto-5d714.firebaseapp.com",
            projectId: "nosso-canto-5d714",
            storageBucket: "nosso-canto-5d714.firebasestorage.app",
            messagingSenderId: "1042257316625",
            appId: "1:1042257316625:web:b96e37ad034b598ea61ab0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('label-parceiro').innerText = `Conectado como: ${usuarioLogado} ❤`;

        function obterDataFormatada() {
            const d = new Date();
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function verificarPinSeguranca() {
            const pinDigitado = prompt("⚠️ Para realizar esta ação, digite o PIN de segurança:");
            if (pinDigitado === "1566") return true;
            if (pinDigitado !== null) alert("PIN incorreto! Ação cancelada. 🔐");
            return false;
        }

        function resetarFormularioCard() {
            document.getElementById('editando-card-id').value = '';
            document.getElementById('card-nome').value = '';
            document.getElementById('card-desc').value = '';
            document.getElementById('card-foto-url').value = '';
            document.getElementById('card-link-externo').value = '';
            document.getElementById('titulo-painel-cardsdela').innerText = '📸 Adicionar Novo Card';
            document.getElementById('btn-salvar-card').innerText = 'Publicar Lembrança 💖';
        }

        window.salvarCardFirebase = async function() {
            const idEditando = document.getElementById('editando-card-id').value;
            const titulo = document.getElementById('card-nome').value.trim();
            const subtitulo = document.getElementById('card-desc').value.trim();
            const imagem = document.getElementById('card-foto-url').value.trim();
            const link = document.getElementById('card-link-externo').value.trim() || "#";

            if (!titulo || !subtitulo || !imagem) { alert('Por favor, preencha todos os campos obrigatórios! 📸'); return; }

            try {
                if (idEditando) {
                    await updateDoc(doc(db, "posts", idEditando), { titulo, subtitulo, imagem, link });
                    alert('Card atualizado com sucesso! ✨');
                } else {
                    await addDoc(collection(db, "posts"), {
                        destino: 'dela', titulo, subtitulo, imagem, link, autor: usuarioLogado, data: obterDataFormatada(), criadoEm: Date.now()
                    });
                    alert('Lembrança adicionada aos Cards Dela! ❤️');
                }
                resetarFormularioCard();
            } catch (error) { console.error(error); }
        };
        document.getElementById('btn-salvar-card').addEventListener('click', window.salvarCardFirebase);

        window.prepararEdicaoFirebase = function(id, destino, titulo, subtitulo, imagem, link, data) {
            document.getElementById('editando-card-id').value = id;
            document.getElementById('card-nome').value = titulo;
            document.getElementById('card-desc').value = subtitulo;
            document.getElementById('card-foto-url').value = imagem;
            document.getElementById('card-link-externo').value = (link === "#") ? "" : link;
            document.getElementById('titulo-painel-cardsdela').innerText = '✏️ Editar Card';
            document.getElementById('btn-salvar-card').innerText = 'Atualizar Card ✨';
            document.getElementById('painel-cardsdela-posts').scrollIntoView({ behavior: 'smooth' });
        };

        window.removerPostagemFirebase = async function(id) {
            if (verificarPinSeguranca()) {
                await deleteDoc(doc(db, "posts", id));
                resetarFormularioCard();
                alert("Lembrança apagada com sucesso! 👍");
            }
        };

        window.adicionarComentarioFirebase = async function(idPost) {
            const input = document.getElementById(`input-${idPost}`);
            const texto = input.value.trim();
            if(!texto) return;

            try {
                await addDoc(collection(db, "posts", idPost, "comentarios"), {
                    autor: usuarioLogado,
                    texto: texto,
                    criadoEm: Date.now()
                });
                input.value = '';
            } catch(e) { console.error(e); }
        };

        window.removerComentarioFirebase = async function(idPost, idComent) {
            if(verificarPinSeguranca()) {
                try {
                    await deleteDoc(doc(db, "posts", idPost, "comentarios", idComent));
                } catch(e) { console.error(e); }
            }
        };

        window.verificarEnter = function(e, idPost) {
            if(e.key === 'Enter') { window.adicionarComentarioFirebase(idPost); }
        };

        const containerCards = document.getElementById('novos-cards-dela');
        // Filtro exato igual ao da página principal ('destino == dela')
        const qCards = query(collection(db, "posts"), where("destino", "==", "dela"));
        
        onSnapshot(qCards, (snapshot) => {
            containerCards.innerHTML = '';
            let itensDela = [];

            snapshot.forEach((docSnap) => {
                itensDela.push({ id: docSnap.id, ...docSnap.data() });
            });

            // Ordena do mais antigo para o mais recente igual à listagem base
            itensDela.sort((a, b) => (a.criadoEm || 0) - (b.criadoEm || 0));

            itensDela.forEach((post, index) => {
                const numeroProgressivo = index + 1;
                const controleModificacao = (post.autor === usuarioLogado) ? `
                    <div class="acoes-card-custom">
                        <button class="btn-acao-card btn-editar" onclick="prepararEdicaoFirebase('${post.id}', '${post.destino}', '${post.titulo.replace(/'/g, "\\'")}', \`${post.subtitulo.replace(/`/g, "\\`").replace(/\$/g, "\\$")}\`, '${post.imagem}', '${post.link}', '${post.data}')">Editar ✏️</button>
                        <button class="btn-acao-card btn-excluir" onclick="removerPostagemFirebase('${post.id}')">Excluir 🗑️</button>
                    </div>
                ` : '';

                const bloco = document.createElement('div');
                bloco.className = 'card-separador-interno';
                bloco.innerHTML = `
                    <div class="data-card"><span>🗓️ ${post.data || ''}</span> <span class="autor-tag">Postado por: ${post.autor || 'Anônimo'}</span></div>
                    <a href="${post.link || '#'}" target="_blank" class="pdf-link">
                        <div class="pdf-bloco">
                            <div class="numero-card">${numeroProgressivo}</div>
                            <div class="moldura-imagem"><img src="${post.imagem}" alt="${post.titulo}" loading="lazy"></div>
                            <div class="contador-titulo">${post.titulo}</div>
                            <div class="contador-tempo">Clique para abrir 📂</div>
                            <div class="pdf-subtitulo">${post.subtitulo}</div>
                        </div>
                    </a>
                    <div class="secao-comentarios">
                        <div class="form-comentario">
                            <input type="text" id="input-${post.id}" class="input-comentario" placeholder="Comente algo...">
                            <button class="btn-comentar" onclick="adicionarComentarioFirebase('${post.id}')">❤️ Enviar</button>
                        </div>
                        <div id="lista-${post.id}" class="lista-comentarios"></div>
                    </div>
                    ${controleModificacao}
                `;
                
                containerCards.appendChild(bloco);

                setTimeout(() => {
                    const inp = document.getElementById(`input-${post.id}`);
                    if(inp) inp.addEventListener('keypress', function(e) { window.verificarEnter(e, post.id); });
                }, 200);

                // Carrega em tempo real os comentários com a mesma estrutura
                const qComents = query(collection(db, "posts", post.id, "comentarios"), orderBy("criadoEm", "asc"));
                onSnapshot(qComents, (comentSnap) => {
                    const boxComentarios = document.getElementById(`lista-${post.id}`);
                    if(!boxComentarios) return;
                    boxComentarios.innerHTML = '';

                    comentSnap.forEach((cDoc) => {
                        const coment = cDoc.data();
                        const idComent = cDoc.id;
                        const divC = document.createElement('div');
                        divC.className = 'comentario-linha';

                        const botaoApagar = (coment.autor === usuarioLogado) ? 
                            `<button class="btn-deletar-comentario" onclick="removerComentarioFirebase('${post.id}', '${idComent}')">🗑️</button>` : '';

                        divC.innerHTML = `
                            <span><strong>${coment.autor}:</strong> ${coment.texto}</span>
                            ${botaoApagar}
                        `;
                        boxComentarios.appendChild(divC);
                    });
                    boxComentarios.scrollTop = boxComentarios.scrollHeight;
                });
            });
        });
    </script>

    <script>
        const canvas = document.getElementById('canvas-hearts'); const ctx = canvas.getContext('2d');
        let listaCoracoes = [];

        function redimensionarCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', redimensionarCanvas); redimensionarCanvas();

        class Coracao {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + Math.random() * 20;
                this.size = Math.random() * 8 + 5; this.speed = Math.random() * 1.5 + 1.2; 
                this.opacity = 1; this.colorValue = 140 + Math.floor(Math.random() * 40);
            }
            atualizar() { this.y -= this.speed; this.x += Math.sin(this.y / 30) * 0.2; this.opacity -= 0.005; }
            desenhar() {
                ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = `rgba(${this.colorValue}, 98, 93, ${this.opacity})`;
                ctx.beginPath(); ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - this.size / 2, this.y - this.size / 2, this.x - this.size, this.y + this.size / 3, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x + this.size, this.y + this.size / 3, this.x + this.size / 2, this.y - this.size / 2, this.x, this.y);
                ctx.fill(); ctx.restore();
            }
        }

        function animarLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            listaCoracoes = listaCoracoes.filter(c => { c.atualizar(); c.desenhar(); return c.opacity > 0 && c.y >= -20; });
            requestAnimationFrame(animarLoop);
        }
        document.addEventListener('DOMContentLoaded', () => { animarLoop(); });
    </script>
</body>
</html>
